<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老六工作台 - 实时状态</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root { --primary: #ff6b6b; --success: #51cf66; --warning: #fcc419; --info: #339af0; }
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: #fff; font-family: 'Noto Sans SC', sans-serif; }
        .container { max-width: 1000px; margin: 0 auto; padding: 40px 24px; }
        h1 { text-align: center; font-size: 36px; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 30px; }
        .banner { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 16px; background: rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 30px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: var(--success); animation: pulse 2s infinite; }
        .dot.offline { background: var(--warning); }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 20px; }
        .card h2 { font-size: 16px; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .card.current h2 { color: var(--primary); }
        .card.done h2 { color: var(--success); }
        .card.pending h2 { color: var(--warning); }
        .card.system h2 { color: var(--info); }
        .task { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; display: flex; justify-content: space-between; }
        .task:last-child { border: none; }
        .task-time { color: #888; font-size: 12px; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat { text-align: center; padding: 16px; background: rgba(0,0,0,0.2); border-radius: 8px; }
        .stat-val { font-size: 28px; font-weight: bold; color: var(--primary); }
        .stat-label { font-size: 12px; color: #888; margin-top: 4px; }
        .footer { text-align: center; margin-top: 30px; color: #666; font-size: 12px; }
        .btn { background: var(--primary); border: none; color: white; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦞 老六工作台</h1>
        <p class="subtitle">实时工作状态</p>
        
        <div class="banner">
            <div class="dot" id="dot"></div>
            <span id="status">检查中...</span>
            <span style="color:#666">|</span>
            <span style="font-size:12px;color:#888">更新: <span id="time">-</span></span>
        </div>
        
        <div class="grid">
            <div class="card current"><h2>📌 当前任务</h2><div id="current">加载中...</div></div>
            <div class="card done"><h2>✅ 已完成</h2><div id="done">加载中...</div></div>
            <div class="card pending"><h2>📋 待办</h2><div id="pending">加载中...</div></div>
            <div class="card system"><h2>📊 系统状态</h2><div class="stats" id="stats">加载中...</div></div>
        </div>
        
        <div class="footer"><button class="btn" onclick="load()">🔄 刷新</button></div>
    </div>

    <script>
    const base = '';
    function now(){ document.getElementById('time').textContent = new Date().toLocaleTimeString(); }
    
    // 检查 Gateway
    async function checkGW(){
        try{
            await fetch('http://127.0.0.1:18789/',{method:'HEAD',mode:'no-cors'});
            document.getElementById('dot').classList.remove('offline');
            document.getElementById('status').textContent = 'Gateway 在线';
        }catch(e){
            document.getElementById('dot').classList.add('offline');
            document.getElementById('status').textContent = 'Gateway 离线';
        }
    }
    
    // 加载数据
    async function load(){
        now(); await checkGW();
        try{
            const [newsR,diaryR,progR] = await Promise.all([
                fetch(base+'news-data.json'),
                fetch(base+'diary-data.json'),
                fetch(base+'PROGRESS.md')
            ]);
            const news = await newsR.json();
            const diary = await diaryR.json();
            const prog = await progR.text();
            
            // 解析任务
            const done=[], pending=[];
            prog.split('\n').forEach(line=>{
                if(line.match(/-\s*\[x\]/)) done.push(line.replace(/-\s*\[x\]\s*/,'').trim());
                if(line.match(/-\s*\[\s*\]/)) pending.push(line.replace(/-\s*\[\s*\]\s*/,'').trim());
            });
            
            // 渲染
            document.getElementById('current').innerHTML = pending[0] 
                ? `<div class="task"><span>${pending[0]}</span><span class="task-time">进行中</span></div>`
                : done[0] ? `<div class="task"><span>${done[0]}</span><span class="task-time">刚刚完成</span></div>`
                : '<div class="task"><span>等待任务...</span><span class="task-time">-</span></div>';
            
            document.getElementById('done').innerHTML = done.slice(0,5).map(t=>`<div class="task"><span>${t.substring(0,30)}</span></div>`).join('')||'暂无';
            document.getElementById('pending').innerHTML = pending.slice(0,5).map(t=>`<div class="task"><span>${t.substring(0,30)}</span><span class="task-time">待处理</span></div>`).join('')||'暂无';
            document.getElementById('stats').innerHTML = `
                <div class="stat"><div class="stat-val">${news.news?.length||0}</div><div class="stat-label">快讯</div></div>
                <div class="stat"><div class="stat-val">${diary.diaries?.length||0}</div><div class="stat-label">日记</div></div>`;
        }catch(e){ console.error(e); }
    }
    
    load();
    setInterval(load, 30000);
    setInterval(now, 1000);
    </script>
</body>
</html>
